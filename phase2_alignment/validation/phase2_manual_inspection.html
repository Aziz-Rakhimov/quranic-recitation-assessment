<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase 2 — Tajweed Alignment Inspection</title>
<style>
:root {
  --bg: #0f1117;
  --bg2: #1a1d27;
  --bg3: #242836;
  --border: #2e3347;
  --text: #e0e4f0;
  --text2: #8b90a5;
  --accent: #6c8aff;
  --green: #34d399;
  --blue: #60a5fa;
  --orange: #fb923c;
  --purple: #c084fc;
  --red: #f87171;
  --yellow: #fbbf24;
  --madd-bg: rgba(52,211,153,0.12);
  --noon-bg: rgba(96,165,250,0.12);
  --qalqalah-bg: rgba(251,146,60,0.12);
  --emphasis-bg: rgba(192,132,252,0.12);
  --pron-bg: rgba(248,113,113,0.12);
  --flag-bg: rgba(251,191,36,0.10);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  background: var(--bg);
  color: var(--text);
  font-size: 13px;
  line-height: 1.5;
}
/* Layout */
.app { display: flex; height: 100vh; }
.sidebar {
  width: 240px;
  min-width: 240px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
}
.main {
  flex: 1;
  overflow-y: auto;
  padding: 0;
}
/* Sidebar */
.sidebar-header {
  padding: 16px;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  font-weight: 700;
  color: var(--accent);
}
.sidebar-nav { padding: 8px; }
.nav-item {
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 2px;
  transition: background 0.15s;
}
.nav-item:hover { background: var(--bg3); }
.nav-item.active { background: var(--accent); color: #fff; }
.nav-item .count { font-size: 11px; opacity: 0.6; }
/* Summary panel */
.summary-panel {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  align-items: flex-start;
}
.stat-card {
  background: var(--bg3);
  border-radius: 8px;
  padding: 12px 16px;
  min-width: 120px;
}
.stat-card .label { font-size: 10px; text-transform: uppercase; color: var(--text2); letter-spacing: 0.5px; }
.stat-card .value { font-size: 22px; font-weight: 700; margin-top: 2px; }
.stat-card .sub { font-size: 11px; color: var(--text2); }
.coverage-bars { display: flex; flex-direction: column; gap: 4px; }
.coverage-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
.coverage-row .bar-bg { width: 80px; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
.coverage-row .bar-fill { height: 100%; border-radius: 3px; }
.coverage-row .cat-name { width: 110px; }
.coverage-row .cat-count { width: 40px; text-align: right; color: var(--text2); }
/* Filters */
.filters-bar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-group label { font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.3px; }
.filter-btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.filter-btn:hover { border-color: var(--accent); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.toggle-btn { position: relative; }
.toggle-btn.active::before { content: '✓ '; }
/* Surah section */
.surah-section {
  border-bottom: 1px solid var(--border);
}
.surah-header {
  padding: 12px 24px;
  background: var(--bg2);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid var(--border);
}
.surah-header:hover { background: var(--bg3); }
.surah-header .arrow {
  transition: transform 0.2s;
  font-size: 10px;
  color: var(--text2);
}
.surah-header.collapsed .arrow { transform: rotate(-90deg); }
.surah-header .surah-title { font-weight: 700; font-size: 14px; }
.surah-header .surah-stats { font-size: 11px; color: var(--text2); margin-left: auto; }
.surah-body { display: block; }
.surah-body.hidden { display: none; }
/* Ayah */
.ayah-block {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
}
.ayah-arabic {
  font-family: 'Traditional Arabic', 'Scheherazade New', 'Amiri', serif;
  font-size: 22px;
  direction: rtl;
  text-align: right;
  padding: 8px 0;
  line-height: 1.8;
  color: var(--text);
}
.ayah-meta {
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 8px;
}
/* Phone table */
.phone-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.phone-table thead th {
  background: var(--bg3);
  padding: 6px 10px;
  text-align: left;
  font-size: 10px;
  text-transform: uppercase;
  color: var(--text2);
  letter-spacing: 0.4px;
  position: sticky;
  top: 42px;
  z-index: 5;
  border-bottom: 1px solid var(--border);
}
.phone-table tbody td {
  padding: 4px 10px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
.phone-table tbody tr:hover { background: rgba(108,138,255,0.05); }
/* Word group separator */
tr.word-start td { border-top: 2px solid var(--border); }
.word-cell {
  font-family: 'Traditional Arabic', 'Scheherazade New', 'Amiri', serif;
  font-size: 16px;
  direction: rtl;
}
.ipa-cell { font-weight: 600; font-size: 13px; }
/* Rule badges */
.badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 3px;
  font-size: 10px;
  font-weight: 600;
  margin: 1px 2px;
  white-space: nowrap;
}
.badge-madd { background: var(--madd-bg); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }
.badge-noon { background: var(--noon-bg); color: var(--blue); border: 1px solid rgba(96,165,250,0.3); }
.badge-qalqalah { background: var(--qalqalah-bg); color: var(--orange); border: 1px solid rgba(251,146,60,0.3); }
.badge-emphasis { background: var(--emphasis-bg); color: var(--purple); border: 1px solid rgba(192,132,252,0.3); }
.badge-pron { background: var(--pron-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
/* Row coloring by rule category */
tr.cat-madd { background: var(--madd-bg); }
tr.cat-noon { background: var(--noon-bg); }
tr.cat-qalqalah { background: var(--qalqalah-bg); }
tr.cat-emphasis { background: var(--emphasis-bg); }
tr.cat-pron { background: var(--pron-bg); }
/* Flagged duration */
tr.flagged-dur td { position: relative; }
tr.flagged-dur td:nth-child(6) {
  color: var(--yellow);
  font-weight: 700;
}
tr.flagged-dur::after {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: var(--yellow);
}
tr.flagged-dur { position: relative; }
.flag-icon { color: var(--yellow); margin-left: 4px; font-size: 10px; }
/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border); }
/* Legend */
.legend {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  padding: 4px 0;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
}
.legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="sidebar-header">Phase 2 Inspection</div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </div>
  <div class="main" id="main">
    <div class="summary-panel" id="summary-panel"></div>
    <div class="filters-bar" id="filters-bar"></div>
    <div id="content"></div>
  </div>
</div>

// ======================== CONSTANTS ========================
const RULE_CATEGORIES = {
  'ghunnah_mushaddadah_noon': 'noon', 'ghunnah_mushaddadah_meem': 'noon',
  'idhhar_halqi_noon': 'noon', 'idgham_ghunnah_noon': 'noon',
  'idgham_no_ghunnah': 'noon', 'iqlab': 'noon',
  'ikhfaa_light': 'noon', 'ikhfaa_heavy': 'noon',
  'idhhar_shafawi': 'noon', 'idgham_shafawi_meem': 'noon',
  'ikhfaa_shafawi': 'noon',
  'madd_tabii': 'madd', 'madd_muttasil': 'madd', 'madd_munfasil': 'madd',
  'madd_lazim_kalimi': 'madd', 'madd_lazim_muthaqqal_kalimi': 'madd',
  'madd_arid_lissukun': 'madd', 'madd_silah_kubra': 'madd',
  'qalqalah_minor': 'qalqalah', 'qalqalah_major': 'qalqalah',
  'qalqalah_with_shaddah': 'qalqalah', 'qalqalah_emphatic': 'qalqalah',
  'qalqalah_non_emphatic': 'qalqalah',
  'vowel_backing_after_emphatic_short': 'emphasis',
  'vowel_backing_after_emphatic_long': 'emphasis',
  'vowel_backing_before_emphatic_short': 'emphasis',
  'vowel_backing_before_emphatic_long': 'emphasis',
  'emphasis_blocking_by_front_vowel': 'emphasis',
  'cross_word_emphasis_continuation': 'emphasis',
  'ta_marbuta_waqf': 'pron', 'ta_marbuta_wasl': 'pron',
};

const CAT_LABELS = {
  'madd': 'Madd', 'noon': 'Noon/Meem', 'qalqalah': 'Qalqalah',
  'emphasis': 'Emphasis', 'pron': 'Pronunciation'
};
const CAT_COLORS = {
  'madd': '#34d399', 'noon': '#60a5fa', 'qalqalah': '#fb923c',
  'emphasis': '#c084fc', 'pron': '#f87171'
};
const CAT_ORDER = ['madd', 'noon', 'qalqalah', 'emphasis', 'pron'];

function getRuleCat(rule) { return RULE_CATEGORIES[rule] || 'other'; }
function getPhoneCats(phone) {
  const cats = new Set();
  (phone.tajweed_rules || []).forEach(r => cats.add(getRuleCat(r)));
  return cats;
}
function getPrimaryCat(phone) {
  const rules = phone.tajweed_rules || [];
  if (!rules.length) return null;
  for (const c of CAT_ORDER) {
    if (rules.some(r => getRuleCat(r) === c)) return c;
  }
  return 'other';
}

// ======================== STATE ========================
let state = {
  activeSurah: null,
  collapsedSurahs: new Set(),
  filterCat: null,      // null = all, or 'madd','noon', etc
  onlyRules: false,
  onlyFlagged: false,
};

// ======================== COMPUTE STATS ========================
function computeStats() {
  let totalAyahs = 0, totalWords = 0, totalPhones = 0;
  let annotatedPhones = 0;
  const catCounts = {};
  CAT_ORDER.forEach(c => catCounts[c] = 0);
  let flaggedShort = 0, flaggedLong = 0;

  DATA.forEach(s => {
    s.verses.forEach(v => {
      totalAyahs++;
      v.words.forEach(w => {
        totalWords++;
        w.phones.forEach(p => {
          totalPhones++;
          const rules = p.tajweed_rules || [];
          if (rules.length) {
            annotatedPhones++;
            const cats = new Set();
            rules.forEach(r => cats.add(getRuleCat(r)));
            cats.forEach(c => { if (catCounts[c] !== undefined) catCounts[c]++; });
          }
          if (p.duration_ms < 20) flaggedShort++;
          if (p.duration_ms > 800) flaggedLong++;
        });
      });
    });
  });

  return { totalAyahs, totalWords, totalPhones, annotatedPhones, catCounts, flaggedShort, flaggedLong };
}

// ======================== RENDER SUMMARY ========================
function renderSummary() {
  const stats = computeStats();
  const panel = document.getElementById('summary-panel');

  let html = '';
  html += `<div class="stat-card"><div class="label">Ayahs</div><div class="value">${stats.totalAyahs}</div><div class="sub">across ${DATA.length} surahs</div></div>`;
  html += `<div class="stat-card"><div class="label">Words</div><div class="value">${stats.totalWords}</div></div>`;
  html += `<div class="stat-card"><div class="label">Phones</div><div class="value">${stats.totalPhones}</div><div class="sub">${stats.annotatedPhones} with rules (${(stats.annotatedPhones/stats.totalPhones*100).toFixed(1)}%)</div></div>`;
  html += `<div class="stat-card"><div class="label">Flagged</div><div class="value" style="color:var(--yellow)">${stats.flaggedShort + stats.flaggedLong}</div><div class="sub">${stats.flaggedShort} short (&lt;20ms), ${stats.flaggedLong} long (&gt;800ms)</div></div>`;

  html += `<div class="stat-card"><div class="label">Coverage by Category</div><div class="coverage-bars">`;
  CAT_ORDER.forEach(c => {
    const count = stats.catCounts[c];
    const pct = (count / stats.totalPhones * 100);
    const color = CAT_COLORS[c];
    html += `<div class="coverage-row">
      <span class="cat-name" style="color:${color}">${CAT_LABELS[c]}</span>
      <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(pct*3,100)}%;background:${color}"></div></div>
      <span class="cat-count">${count}</span>
    </div>`;
  });
  html += `</div></div>`;

  html += `<div class="stat-card"><div class="label">Legend</div><div class="legend">`;
  CAT_ORDER.forEach(c => {
    html += `<div class="legend-item"><div class="legend-dot" style="background:${CAT_COLORS[c]}"></div>${CAT_LABELS[c]}</div>`;
  });
  html += `<div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>Flagged</div>`;
  html += `</div></div>`;

  panel.innerHTML = html;
}

// ======================== RENDER SIDEBAR ========================
function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  let html = '';
  DATA.forEach(s => {
    const ayahCount = s.verses.length;
    const isActive = state.activeSurah === s.surah;
    html += `<div class="nav-item ${isActive ? 'active' : ''}" onclick="jumpToSurah(${s.surah})">
      <span>${s.surah}. ${s.surah_name}</span>
      <span class="count">${ayahCount}</span>
    </div>`;
  });
  nav.innerHTML = html;
}

// ======================== RENDER FILTERS ========================
function renderFilters() {
  const bar = document.getElementById('filters-bar');
  let html = '';

  html += `<div class="filter-group"><label>Category:</label>`;
  html += `<button class="filter-btn ${!state.filterCat ? 'active' : ''}" onclick="setFilterCat(null)">All</button>`;
  CAT_ORDER.forEach(c => {
    html += `<button class="filter-btn ${state.filterCat === c ? 'active' : ''}"
      style="${state.filterCat === c ? 'background:'+CAT_COLORS[c]+';border-color:'+CAT_COLORS[c] : ''}"
      onclick="setFilterCat('${c}')">${CAT_LABELS[c]}</button>`;
  });
  html += `</div>`;

  html += `<div class="filter-group">`;
  html += `<button class="filter-btn toggle-btn ${state.onlyRules ? 'active' : ''}" onclick="toggleOnlyRules()">Rules only</button>`;
  html += `<button class="filter-btn toggle-btn ${state.onlyFlagged ? 'active' : ''}" onclick="toggleOnlyFlagged()">Flagged only</button>`;
  html += `</div>`;

  bar.innerHTML = html;
}

// ======================== RENDER CONTENT ========================
function renderContent() {
  const container = document.getElementById('content');
  let html = '';

  DATA.forEach(s => {
    const collapsed = state.collapsedSurahs.has(s.surah);
    const surahPhones = [];
    s.verses.forEach(v => v.words.forEach(w => w.phones.forEach(p => surahPhones.push(p))));
    const ruledCount = surahPhones.filter(p => p.tajweed_rules.length).length;

    html += `<div class="surah-section" id="surah-${s.surah}">`;
    html += `<div class="surah-header ${collapsed ? 'collapsed' : ''}" onclick="toggleSurah(${s.surah})">
      <span class="arrow">▼</span>
      <span class="surah-title">${s.surah}. ${s.surah_name}</span>
      <span class="surah-stats">${s.verses.length} ayahs · ${surahPhones.length} phones · ${ruledCount} annotated</span>
    </div>`;

    html += `<div class="surah-body ${collapsed ? 'hidden' : ''}">`;

    s.verses.forEach(v => {
      html += renderAyah(s.surah, v);
    });

    html += `</div></div>`;
  });

  container.innerHTML = html;
}

function renderAyah(surahNum, verse) {
  let html = '';
  html += `<div class="ayah-block" id="ayah-${surahNum}-${verse.ayah}">`;
  html += `<div class="ayah-meta">${surahNum}:${verse.ayah} · ${verse.words.length} words · ${verse.duration.toFixed(2)}s</div>`;
  html += `<div class="ayah-arabic">${verse.text}</div>`;

  html += `<table class="phone-table"><thead><tr>
    <th>Word</th><th>#</th><th>IPA</th><th>MFA</th>
    <th>Start (ms)</th><th>End (ms)</th><th>Dur (ms)</th><th>Tajweed Rules</th>
  </tr></thead><tbody>`;

  let phoneIdx = 0;
  verse.words.forEach((w, wi) => {
    w.phones.forEach((p, pi) => {
      phoneIdx++;
      const rules = p.tajweed_rules || [];
      const cat = getPrimaryCat(p);
      const isFlagged = p.duration_ms < 20 || p.duration_ms > 800;

      // Apply filters
      let visible = true;
      if (state.filterCat && (!cat || !rules.some(r => getRuleCat(r) === state.filterCat))) visible = false;
      if (state.onlyRules && !rules.length) visible = false;
      if (state.onlyFlagged && !isFlagged) visible = false;

      const classes = [];
      if (pi === 0) classes.push('word-start');
      if (cat) classes.push('cat-' + cat);
      if (isFlagged) classes.push('flagged-dur');
      if (!visible) classes.push('hidden-row');

      html += `<tr class="${classes.join(' ')}" ${!visible ? 'style="display:none"' : ''}>`;

      html += `<td class="word-cell">${pi === 0 ? w.text : ''}</td>`;

      html += `<td>${phoneIdx}</td>`;
      html += `<td class="ipa-cell">${p.ipa}</td>`;
      html += `<td style="color:var(--text2)">${p.mfa}</td>`;
      html += `<td>${(p.start * 1000).toFixed(0)}</td>`;
      html += `<td>${(p.end * 1000).toFixed(0)}</td>`;
      html += `<td>${p.duration_ms.toFixed(0)}${isFlagged ? '<span class="flag-icon">⚠</span>' : ''}</td>`;

      html += `<td>`;
      rules.forEach(r => {
        const rc = getRuleCat(r);
        html += `<span class="badge badge-${rc}">${r}</span>`;
      });
      html += `</td>`;
      html += `</tr>`;
    });
  });

  html += `</tbody></table></div>`;
  return html;
}

// ======================== INTERACTIONS ========================
function jumpToSurah(num) {
  state.activeSurah = num;
  // Ensure uncollapsed
  state.collapsedSurahs.delete(num);
  renderSidebar();
  renderContent();
  const el = document.getElementById('surah-' + num);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function toggleSurah(num) {
  if (state.collapsedSurahs.has(num)) {
    state.collapsedSurahs.delete(num);
  } else {
    state.collapsedSurahs.add(num);
  }
  renderContent();
}

function setFilterCat(cat) {
  state.filterCat = cat;
  renderFilters();
  renderContent();
}

function toggleOnlyRules() {
  state.onlyRules = !state.onlyRules;
  renderFilters();
  renderContent();
}

function toggleOnlyFlagged() {
  state.onlyFlagged = !state.onlyFlagged;
  renderFilters();
  renderContent();
}

// ======================== INIT ========================
renderSummary();
renderSidebar();
renderFilters();
renderContent();
</script>
</body>
</html>
